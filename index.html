<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Pozvanie na rande ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6ea,#ffb3d9);
    overflow:hidden;
}

.container{
    text-align:center;
    padding:20px;
}

h1{
    color:#ff1493;
    font-size:50px;
    margin-bottom:40px;
}

button{
    border:none;
    border-radius:15px;
    cursor:pointer;
    transition:.25s;
}

#yes{
    background:#ff1493;
    color:white;
    font-size:28px;
    padding:20px 50px;
    margin-right:20px;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:white;
    color:#ff1493;
    font-size:22px;
    padding:18px 35px;
    position:absolute;
}

#step2,
#stepFood,
#step3{
    display:none;
}

input{
    font-size:22px;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-bottom:20px;
}

#confirm{
    background:#ff1493;
    color:white;
    font-size:24px;
    padding:15px 40px;
}

.foods{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

.food{
    background:#ff1493;
    color:white;
    font-size:24px;
    padding:15px 25px;
}

.food:hover{
    transform:scale(1.08);
}
</style>

</head>
<body>

<div class="container">

<div id="step1">
<h1>💖 Pôjdeš so mnou na rande? 💖</h1>

<button id="yes">ÁNO URČITE ❤️</button>
<button id="no">Nie 😅</button>
</div>

<div id="step2">
<h1>📅 Vyber dátum a čas</h1>
<br>

<input type="datetime-local" id="date">

<br><br>

<button id="confirm">Pokračovať ❤️</button>
</div>

<div id="stepFood">
<h1>😋 Na čo máš chuť?</h1>

<div class="foods">
<button class="food">🍕 Pizza</button>
<button class="food">🍔 Burger</button>
<button class="food">🍣 Sushi</button>
<button class="food">🍝 Cestoviny</button>
<button class="food">🥤 Drink</button>
<button class="food">🍟 Hranolky</button>
<button class="food">🌮 Taco</button>
<button class="food">🍦 Zmrzlina</button>
</div>
</div>

<div id="step3">
<h1>🥰 Veľmi sa teším, že ťa uvidím! ❤️</h1>
<h2 style="margin-top:20px;color:#ff1493;">💖 Bude to úžasné 💖</h2>
</div>

</div>

<script>
const no=document.getElementById("no");

// Náhodná počiatočná pozícia
moveButton();

function moveButton(){
    const x=Math.random()*(window.innerWidth-160);
    const y=Math.random()*(window.innerHeight-80);

    no.style.left=x+"px";
    no.style.top=y+"px";
}

// Na PC
no.addEventListener("mouseover",moveButton);

// Na mobile
no.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveButton();
});

// ÁNO
document.getElementById("yes").onclick=function(){
    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
};

// Dátum
document.getElementById("confirm").onclick=function(){

    if(document.getElementById("date").value===""){
        alert("❤️ Prosím vyber dátum a čas.");
        return;
    }

    document.getElementById("step2").style.display="none";
    document.getElementById("stepFood").style.display="block";
};

// Výber jedla
document.querySelectorAll(".food").forEach(button=>{
    button.onclick=function(){
        document.getElementById("stepFood").style.display="none";
        document.getElementById("step3").style.display="block";
    };
});
</script>

</body>
</html>
